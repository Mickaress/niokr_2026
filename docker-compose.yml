# Запуск из каталога study: docker compose up --build
# Снаружи один адрес: http://localhost:8080 (фронт, /api/, /media/)
#
# Публичный URL без слэша на конце (сборка фронта + CORS):
#   export PUBLIC_ORIGIN=https://example.com
#
# Пароль БД «niokr» — смените в проде. Порты db наружу в проде лучше убрать.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: niokr
      POSTGRES_PASSWORD: niokr
      POSTGRES_DB: niokr
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niokr -d niokr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./niokr-server2
    expose:
      - "8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: docker-dev-secret-not-for-production-min-50-chars-xxxxxxxx
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      POSTGRES_DB: niokr
      POSTGRES_USER: niokr
      POSTGRES_PASSWORD: niokr
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost:8080}
      DJANGO_SERVE_MEDIA: "1"
    volumes:
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./niokr-client
      args:
        VITE_BASE_URL: /
        VITE_API_URL: ${PUBLIC_ORIGIN:-http://localhost:8080}/api/
        VITE_FILE_URL: ${PUBLIC_ORIGIN:-http://localhost:8080}
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "${PROXY_PORT:-8080}:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  backend_media:
